<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News</title>
    <link rel="stylesheet" href="static/style.css">
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</head>

<body>
    <header class="header">
        <div>
            <h1 class="center title">Cravotta Geochemical Consulting, LLC (CGC)</h1>
        </div>
        <div class="pages">
            <a href="index.html" class="button">Biography</a>
            <a href="software.html" class="button">Software</a>
            <a href="news.html" class="button">News</a>
            <a href="projects.html" class="button">Projects</a>
        </div>
        <img src='static/logo.jpg' class="logo" alt="Logo">
    </header>

    <input
        type="text"
        id="search"
        placeholder="Search title, date, summary..."
        style="margin-bottom: 16px; width: 300px;"
    >
        <div id="container"></div>
    
    <script>
        let allRows = [];
        
        fetch("static/Cravotta_biblio.xlsx")
        .then(response => response.arrayBuffer())
        .then(data => {
            const workbook = XLSX.read(data, { type: "array" });

            const sheetName = "CGC_news";
            const sheet = workbook.Sheets[sheetName];

            allRows = XLSX.utils.sheet_to_json(sheet).filter(r => r.Title);
            console.log("Filtered rows:", allRows);
            render(allRows);
        });
        
        
        document.getElementById("search").addEventListener("input", function () {
            const words = this.value.toLowerCase().split(/\s+/).filter(Boolean);
        
            const filtered = allRows.filter(row => {
                const searchableText = `
                ${row.Title}
                ${row.Date}
                ${row.Keywords}
                ${row.Authors}
                ${row.Publisher}
                ${row.Link}
                `.toLowerCase();
        
                return words.every(word => searchableText.includes(word));
            });
        
            render(filtered);
        });
        
        
        function render(rows) {
            const container = document.getElementById("container");
            container.innerHTML = "";
        
            rows.forEach(row => {
                const card = document.createElement("div");
                card.className = "card";
        
                const title = document.createElement("div");
                title.className = "projecttitle";
                title.textContent = row.Title;
        
                const date = document.createElement("div");
                date.className = "date";
                date.textContent = row.Date;
        
                const summary = document.createElement("div");
                summary.className = "summary";
                summary.textContent = row.Summary;
        
                const authors = document.createElement("div");
                authors.className = "authors";
                authors.textContent = "Authors: " + row.Authors;
        
                const publisher = document.createElement("div");
                publisher.className = "publisher";
                publisher.textContent = "By: " + row.Publisher;

                const link = document.createElement("div");
                link.className = "link";
                link.textContent = row.Link;
        
                card.appendChild(title);
                card.appendChild(date);
                card.appendChild(summary);
                card.appendChild(authors);
                card.appendChild(publisher);
                card.appendChild(link);
        
                container.appendChild(card);
            });
        }
    </script>


</body>
