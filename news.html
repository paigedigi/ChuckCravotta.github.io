<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>

<body>
    <header class="header">
        <div>
            <h1 class="center title">News</h1>
        </div>
        <div class="pages">
            <a href="index.html" class="button">Biography</a>
            <a href="software.html" class="button">Software</a>
            <a href="news.html" class="button">News</a>
            <a href="projects.html" class="button">Projects</a>
        </div>
    
    </header>

    <input
    type="text"
    id="search"
    placeholder="Search title, date, summary..."
    style="margin-bottom: 16px; width: 300px;"
    >
    <div id="container"></div>

    <script>
        let allRows = [];
        Papa.parse("../static/news.csv", {
            download: true,
            header: true,
            complete: function (results) {
                allRows = results.data.filter(r => r.Title);
                render(allRows);
            }
        });


        document.getElementById("search").addEventListener("input", function () {
            const words = this.value.toLowerCase().split(/\s+/).filter(Boolean);

            const filtered = allRows.filter(row => {
                const searchableText = `
                ${row.Title}
                ${row.Date}
                ${row.Summary}
                ${row.Authors}
                ${row.Publisher}
                `.toLowerCase();

                // every word must match somewhere
                return words.every(word => searchableText.includes(word));
            });

            render(filtered);
        });

        function render(rows) {
            const container = document.getElementById("container");
            container.innerHTML = "";

            rows.forEach(row => {
                const card = document.createElement("div");
                card.className = "card";

                const title = document.createElement("div");
                title.className = "title";
                title.textContent = row.Title;

                const date = document.createElement("div");
                date.className = "date";
                date.textContent = row.Date;

                const summary = document.createElement("div");
                summary.className = "summary";
                summary.textContent = row.Summary;

                const authors = document.createElement("div");
                authors.className = "authors";
                authors.textContent = 'Authors: ' + row.Authors;

                const publisher = document.createElement("div");
                publisher.className = "publisher";
                publisher.textContent = 'By: ' + row.Publisher;

                card.appendChild(title);
                card.appendChild(date);
                card.appendChild(summary);
                card.appendChild(authors);
                card.appendChild(publisher);

                container.appendChild(card);

            });
        }


    </script>


</body>
