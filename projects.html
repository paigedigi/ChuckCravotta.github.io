<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects</title>
    <link rel="stylesheet" href="static/style.css">
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</head>

<body>
    <header class="header">
        <div>
            <h1 class="center title">Cravotta Geochemical Consulting, LLC (CGC)</h1>
        </div>
        <div class="pages">
            <a href="index.html" class="button">Biography</a>
            <a href="software.html" class="button">Software</a>
            <a href="news.html" class="button">News</a>
            <a href="projects.html" class="button">Projects</a>
        </div>
        <img src='static/logo.jpg' class="logo" alt="Logo">
    </header>


    <input
        type="text"
        id="searchProject"
        placeholder="Search topic, year, client..."
        style="margin-bottom: 16px; width: 300px;"
    >
        <div id="projectcontatiner"></div>
    
    <script>
        let allRows = [];
        
        fetch("static/Cravotta_biblio.xlsx")
        .then(response => response.arrayBuffer())
        .then(data => {
            const workbook = XLSX.read(data, { type: "array" });

            const sheetName = "CGC_projects";
            const sheet = workbook.Sheets[sheetName];

            allRows = XLSX.utils.sheet_to_json(sheet).filter(r => r.Title);
            console.log("Filtered rows:", allRows);

            render(allRows);
        });
        
        
        document.getElementById("searchProject").addEventListener("input", function () {
            const words = this.value.toLowerCase().split(/\s+/).filter(Boolean);
        
            const filtered = allRows.filter(row => {
                const searchableText = `
                ${row.Client_Collaborator}
                ${row.Topic}
                ${row.RoleCGC}
                ${row.Year_CGC}
                `.toLowerCase();
        
                return words.every(word => searchableText.includes(word));
            });
        
            render(filtered);
        });
        
        
        function render(rows) {
            const container = document.getElementById("projectcontatiner");
            container.innerHTML = "";
        
            rows.forEach(row => {
                const card = document.createElement("div");
                card.className = "card";
        
                const topic = document.createElement("div");
                topic.className = "topic";
                topic.textContent = row.Topic;
        
                const year = document.createElement("div");
                year.className = "year";
                year.textContent = row.Year_CGC;
        
                const role = document.createElement("div");
                role.className = "role";
                role.textContent = row.RoleCGC;
        
                const client = document.createElement("div");
                client.className = "client";
                client.textContent = "client: " + row.Client_Collaborator;
        
        
                card.appendChild(topic);
                card.appendChild(year);
                card.appendChild(role);
                card.appendChild(client);
        
                container.appendChild(card);
            });
        }
    </script>


</body>
