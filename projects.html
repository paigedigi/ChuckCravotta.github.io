<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects</title>
    <link rel="stylesheet" href="static/style.css">
</head>

<main>
    <body>
        <header class="header">
            <div class="title-area">
                <img src="static/logo.jpg" class="logo">
                <h1>Cravotta Geochemical Consulting</h1>
            </div>
        
            <nav>
                <a href="index.html">Biography</a>
                <a href="software.html">Software</a>
                <a href="projects.html">Projects</a>
                <a href="news.html">News</a>
            </nav>
        </header>

        <input
            type="text"
            id="searchProjects"
            placeholder="Search topic, year, client..."
            style="margin-bottom: 16px; width: 300px;"
            >
        <div id="projectcontatiner"></div>

        <script>
            let allRows = [];
            
            fetch("static/Cravotta_biblio.xlsx")
            .then(response => response.arrayBuffer())
            .then(data => {
                const workbook = XLSX.read(data, { type: "array" });
    
                const sheetName = "CGC_projects";
                const sheet = workbook.Sheets[sheetName];
    
                allRows = XLSX.utils.sheet_to_json(sheet).filter(r => r.Topic);
    
                render(allRows);
            });
            
            
            document.getElementById("searchProject").addEventListener("input", function () {
                const words = this.value.toLowerCase().split(/\s+/).filter(Boolean);
            
                const filtered = allRows.filter(row => {
                    const searchableText = `
                    ${row.Client_Collaborator}
                    ${row.Topic}
                    ${row.RoleCGC}
                    ${row.Year_CGC}
                    `.toLowerCase();
            
                    return words.every(word => searchableText.includes(word));
                });
            
                render(filtered);
            });
            
            
            function render(rows) {
                const container = document.getElementById("projectcontatiner");
                container.innerHTML = "";
            
                rows.forEach(row => {
                    const card = document.createElement("div");
                    card.className = "projectscard";
            
                    const topic = document.createElement("div");
                    topic.className = "topic";
                    topic.textContent = row.Topic;
            
                    const year = document.createElement("div");
                    year.className = "year";
                    year.textContent = row.Year_CGC;
            
                    const role = document.createElement("div");
                    role.className = "role";
                    role.textContent = "Role: " + row.RoleCGC;
            
                    const client = document.createElement("div");
                    client.className = "client";
                    client.textContent = "Client or Collaborator: " + row.Client_Collaborator;
            
            
                    card.appendChild(topic);
                    card.appendChild(year);
                    card.appendChild(role);
                    card.appendChild(client);
            
                    container.appendChild(card);
                });
            }
        </script>
    


    </body>
</main>
